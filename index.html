<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BoscoLife '25</title>
    
    <link rel="manifest" href="manifest.json">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #0f0c29; margin: 0; overflow: hidden; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(247, 37, 133, 0.3); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Poora App Logic Yahan Hai
        const { Send, Users, MessageCircle, Settings, Plus, X, Camera, LogOut, Search, Image, Play, User } = (() => {
            const icons = {};
            ['Send', 'Users', 'MessageCircle', 'Settings', 'Plus', 'X', 'Camera', 'LogOut', 'Search', 'Image', 'Play', 'User'].forEach(name => {
                icons[name] = (props) => <i data-lucide={name.toLowerCase()} {...props}></i>;
            });
            return icons;
        })();

        const { useState, useEffect, useRef } = React;

        const DEFAULT_GROUPS = [
            { id: 'grp-11a', name: 'Class 11-A 🏫', emoji: '🏫', color: 'from-blue-500 to-cyan-500' },
            { id: 'grp-study', name: 'Study Group 📚', emoji: '📚', color: 'from-green-500 to-emerald-500' },
            { id: 'grp-fun', name: 'Fun & Memes 😂', emoji: '😂', color: 'from-pink-500 to-purple-500' }
        ];

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [showLoginForm, setShowLoginForm] = useState(true);
            const [activeSection, setActiveSection] = useState('dms');
            const [selectedChat, setSelectedChat] = useState(null);
            const [messages, setMessages] = useState({});
            const [msgInput, setMsgInput] = useState('');
            const [loginName, setLoginName] = useState('');
            const chatEndRef = useRef(null);

            useEffect(() => {
                const savedUser = localStorage.getItem('bosco:user');
                if (savedUser) { setCurrentUser(JSON.parse(savedUser)); setShowLoginForm(false); }
                lucide.createIcons();
            }, []);

            useEffect(() => { 
                lucide.createIcons(); 
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); 
            }, [messages, selectedChat, showLoginForm]);

            const handleLogin = () => {
                if (!loginName.trim()) return alert('Naam likho bhai!');
                const user = { id: Date.now(), name: loginName };
                setCurrentUser(user);
                localStorage.setItem('bosco:user', JSON.stringify(user));
                setShowLoginForm(false);
            };

            const sendMessage = () => {
                if (!msgInput.trim() || !selectedChat) return;
                const chatId = selectedChat.id;
                const newMsg = { 
                    id: Date.now(), 
                    sender: currentUser.name, 
                    text: msgInput, 
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
                };
                setMessages(prev => ({ ...prev, [chatId]: [...(prev[chatId] || []), newMsg] }));
                setMsgInput('');
            };

            if (showLoginForm) return (
                <div className="h-screen flex items-center justify-center p-6 bg-gradient-to-br from-[#0f0c29] to-[#302b63]">
                    <div className="w-full max-w-sm glass p-10 rounded-[40px] text-center shadow-2xl">
                        <div className="text-6xl mb-6">🏫</div>
                        <h1 className="text-3xl font-black mb-2">BoscoLife '25</h1>
                        <p className="text-purple-300 text-sm mb-8">Dosto ka naya adda</p>
                        <input type="text" placeholder="Apna Naam Likho" className="w-full p-4 bg-white/10 rounded-2xl mb-4 outline-none border border-white/10 focus:border-pink-500 text-center text-white" onChange={e => setLoginName(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} />
                        <button onClick={handleLogin} className="w-full py-4 bg-gradient-to-r from-pink-500 to-purple-600 rounded-2xl font-bold shadow-lg shadow-pink-500/20 active:scale-95 transition-all text-white">Start Chatting 🚀</button>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex flex-col bg-[#0f0c29]">
                    <div className="p-4 flex justify-between items-center glass border-b border-white/10">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-pink-500 rounded-xl flex items-center justify-center shadow-lg">🏫</div>
                            <h1 className="font-black text-lg">BoscoLife</h1>
                        </div>
                        <button onClick={() => { localStorage.removeItem('bosco:user'); window.location.reload(); }} className="p-2 bg-white/5 rounded-xl text-red-400">
                             <LogOut size={20} />
                        </button>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        <div className="w-20 md:w-72 bg-black/20 border-r border-white/5 p-2 overflow-y-auto custom-scrollbar">
                            <div className="flex gap-1 mb-4 bg-white/5 p-1 rounded-xl">
                                <button onClick={() => setActiveSection('dms')} className={`flex-1 py-2 rounded-lg text-xs font-bold ${activeSection === 'dms' ? 'bg-pink-500 text-white' : 'text-gray-400'}`}>DMs</button>
                                <button onClick={() => setActiveSection('groups')} className={`flex-1 py-2 rounded-lg text-xs font-bold ${activeSection === 'groups' ? 'bg-blue-500 text-white' : 'text-gray-400'}`}>Groups</button>
                            </div>
                            
                            {(activeSection === 'groups' ? DEFAULT_GROUPS : []).map(item => (
                                <button key={item.id} onClick={() => setSelectedChat(item)} className={`w-full p-3 mb-2 rounded-2xl flex items-center gap-3 transition-all ${selectedChat?.id === item.id ? 'bg-white/10 border border-white/10' : ''}`}>
                                    <div className={`w-12 h-12 rounded-xl bg-gradient-to-br ${item.color || 'from-gray-500 to-gray-700'} flex items-center justify-center text-xl shrink-0`}>{item.emoji || '👤'}</div>
                                    <span className="hidden md:block truncate font-bold text-sm text-white">{item.name}</span>
                                </button>
                            ))}
                        </div>

                        <div className="flex-1 flex flex-col relative">
                            {selectedChat ? (
                                <>
                                    <div className="p-4 glass border-b border-white/5 flex items-center gap-3">
                                        <div className="text-2xl">{selectedChat.emoji || '👤'}</div>
                                        <div className="font-bold text-white">{selectedChat.name}</div>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                                        {(messages[selectedChat.id] || []).map(m => (
                                            <div key={m.id} className={`flex flex-col ${m.sender === currentUser.name ? 'items-end' : 'items-start'}`}>
                                                <div className={`p-3 rounded-2xl max-w-[80%] ${m.sender === currentUser.name ? 'bg-pink-600 rounded-tr-none' : 'bg-white/10 rounded-tl-none'}`}>
                                                    <p className="text-sm text-white">{m.text}</p>
                                                    <p className="text-[9px] mt-1 opacity-50 text-white">{m.time}</p>
                                                </div>
                                            </div>
                                        ))}
                                        <div ref={chatEndRef} />
                                    </div>
                                    <div className="p-4 glass flex gap-2">
                                        <input value={msgInput} onChange={e => setMsgInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMessage()} placeholder="Message..." className="flex-1 bg-white/5 p-3 rounded-2xl outline-none border border-white/5 focus:border-pink-500 text-white" />
                                        <button onClick={sendMessage} className="bg-pink-500 p-4 rounded-2xl font-bold text-white"> <Send size={20} /> </button>
                                    </div>
                                </>
                            ) : (
                                <div className="flex-1 flex flex-col items-center justify-center text-center p-6">
                                    <div className="text-8xl mb-4 animate-pulse">💬</div>
                                    <h2 className="text-2xl font-black text-white">Koi chat select karo!</h2>
                                    <p className="text-gray-500 mt-2">Dosto se baatein shuru karne ka time ho gaya hai.</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
