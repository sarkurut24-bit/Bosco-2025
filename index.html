<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BoscoConnect 2025</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0c29">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #0f0c29; margin: 0; overflow: hidden; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(247, 37, 133, 0.3); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { Send, LogOut, MessageCircle, Users } = (() => {
            const icons = {};
            ['Send', 'LogOut', 'MessageCircle', 'Users'].forEach(name => {
                icons[name] = (props) => <i data-lucide={name.toLowerCase()} {...props}></i>;
            });
            return icons;
        })();

        const { useState, useEffect, useRef } = React;

        const DEFAULT_GROUPS = [
            { id: 'grp-db-2025', name: 'CL 10 batch-2025 Don Bosco', emoji: '🏫', color: 'from-blue-600 to-indigo-600' }
        ];

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [showLoginForm, setShowLoginForm] = useState(true);
            const [groups, setGroups] = useState(DEFAULT_GROUPS);
            const [selectedGroup, setSelectedGroup] = useState(DEFAULT_GROUPS[0]);
            const [messages, setMessages] = useState({});
            const [msgInput, setMsgInput] = useState('');
            const [loginName, setLoginName] = useState('');
            const chatEndRef = useRef(null);

            useEffect(() => {
                const savedUser = localStorage.getItem('bosco:user');
                if (savedUser) { setCurrentUser(JSON.parse(savedUser)); setShowLoginForm(false); }
                const savedMsgs = localStorage.getItem('dbapp:messages');
                if (savedMsgs) setMessages(JSON.parse(savedMsgs));
                lucide.createIcons();
            }, []);

            useEffect(() => { 
                lucide.createIcons(); 
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); 
            }, [messages, selectedGroup, showLoginForm]);

            const handleLogin = () => {
                if (!loginName.trim()) return alert('Bhai naam likho!');
                const user = { id: Date.now(), name: loginName };
                setCurrentUser(user);
                localStorage.setItem('bosco:user', JSON.stringify(user));
                setShowLoginForm(false);
            };

            const sendMessage = () => {
                if (!msgInput.trim()) return;
                const key = `grp_${selectedGroup.id}`;
                const newMsg = { 
                    id: Date.now(), 
                    sender: currentUser.name, 
                    text: msgInput, 
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
                };
                const updatedMsgs = { ...messages, [key]: [...(messages[key] || []), newMsg] };
                setMessages(updatedMsgs);
                localStorage.setItem('dbapp:messages', JSON.stringify(updatedMsgs));
                setMsgInput('');
            };

            if (showLoginForm) return (
                <div className="h-screen flex items-center justify-center p-6 bg-[#0f0c29]">
                    <div className="w-full max-w-sm glass p-10 rounded-[40px] text-center shadow-2xl">
                        <div className="text-6xl mb-6">🏫</div>
                        <h1 className="text-3xl font-black mb-2">BoscoConnect</h1>
                        <p className="text-gray-400 text-sm mb-8">Batch of 2025 Hub</p>
                        <input type="text" placeholder="Apna Naam Likho" className="w-full p-4 bg-white/10 rounded-2xl mb-4 outline-none border border-white/10 focus:border-pink-500 text-center" onChange={e => setLoginName(e.target.value)} />
                        <button onClick={handleLogin} className="w-full py-4 bg-gradient-to-r from-pink-500 to-purple-600 rounded-2xl font-bold shadow-lg shadow-pink-500/25 transition-all">Join Now 🚀</button>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex flex-col bg-[#0f0c29]">
                    <div className="p-4 flex justify-between items-center glass border-b border-white/10">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-pink-500 rounded-xl flex items-center justify-center shadow-lg">🏫</div>
                            <h1 className="font-black text-lg">DB Hub</h1>
                        </div>
                        <button onClick={() => { localStorage.removeItem('bosco:user'); window.location.reload(); }} className="p-2 bg-white/5 rounded-xl text-red-400"><LogOut size={20} /></button>
                    </div>

                    <div className="flex flex-1 overflow-hidden">
                        <div className="w-20 md:w-64 bg-black/20 border-r border-white/5 p-2 overflow-y-auto custom-scrollbar">
                            {groups.map(g => (
                                <button key={g.id} onClick={() => setSelectedGroup(g)} className={`w-full p-3 mb-2 rounded-2xl flex items-center gap-3 transition-all ${selectedGroup.id === g.id ? 'bg-pink-500' : 'hover:bg-white/5'}`}>
                                    <div className={`w-10 h-10 rounded-xl bg-gradient-to-br ${g.color} flex items-center justify-center shrink-0`}>{g.emoji}</div>
                                    <span className="hidden md:block truncate font-bold text-sm">{g.name}</span>
                                </button>
                            ))}
                        </div>

                        <div className="flex-1 flex flex-col relative">
                            <div className="p-3 bg-white/5 text-center text-[10px] font-black border-b border-white/5 text-pink-500 uppercase tracking-widest">{selectedGroup.name}</div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                                {(messages[`grp_${selectedGroup.id}`] || []).map(m => (
                                    <div key={m.id} className={`flex flex-col ${m.sender === currentUser.name ? 'items-end' : 'items-start'}`}>
                                        <span className="text-[10px] opacity-40 mb-1">{m.sender === currentUser.name ? 'You' : m.sender}</span>
                                        <div className={`p-4 rounded-2xl max-w-[85%] text-sm ${m.sender === currentUser.name ? 'bg-pink-600 rounded-tr-none shadow-md' : 'bg-white/10 rounded-tl-none border border-white/5'}`}>{m.text}</div>
                                    </div>
                                ))}
                                <div ref={chatEndRef} />
                            </div>
                            <div className="p-4 glass m-4 rounded-[25px] flex gap-2">
                                <input value={msgInput} onChange={e => setMsgInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMessage()} placeholder="Type something..." className="flex-1 bg-transparent p-2 outline-none text-sm text-white" />
                                <button onClick={sendMessage} className="bg-pink-500 px-5 py-2 rounded-xl font-bold text-xs"><Send size={18} /></button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => {
          console.log("BoscoConnect Service Worker Active!");
        });
      }
    </script>
</body>
</html>
